<!DOCTYPE html>
<html>

<head>
    <!-- Set the title of the popup window -->
    <title>YouTube Bookmark</title>
    <!-- Link the external CSS file for styling the popup -->
    <link rel="stylesheet" type="text/css" href="styles.css">
</head>

<body>
    <!-- Main heading for the extension popup -->
    <h3>Bookmarked Timestamps</h3>
    <!-- Button to trigger saving the current video's timestamp -->
    <button id="bookmark">Save Timestamp</button>
    <!-- Unordered list that will dynamically hold the saved bookmarks -->
    <ul id="timestamps"></ul>
    <!-- Link the external JavaScript file to handle popup logic -->
    <script src="popup.js" defer></script>
</body>

</html>
